{{ if .Others }}
<div class="sideSection">
    <div class="sideSection__heading">
        <h2 class="sideSection__title"> Others </h2>
    </div>
    <div class="sideSection__content">
        <ul>
            {{ range .Others }}
            <li>{{ . | safeHTML }}</li>
            {{ end }}
        </ul>
    </div>
</div>
{{ end }}
